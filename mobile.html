<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        /* --- CORE THEMES --- */
        :root {
            --bg: #1b2838; --header: #171a21; --border: #2a475e; --text: #c7d5e0;
            --user-bg: #2a475e; --user-text: #ffffff; --ai-bg: #1e2026; --ai-text: #ffffff;
            --header-text: #66c0f4; --bubble-outline: 1px solid var(--border);
        }
        
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #ffffff; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; }
        body.theme-messenger { --bg: #000000; --header: #121212; --border: #222; --text: #fff; --user-bg: #0084ff; --user-text: #fff; --ai-bg: #242526; --ai-text: #fff; }
        
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; overflow-x: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            display: flex; flex-direction: column;
            padding-top: 70px; /* Slightly more space for mobile header */
            background-color: var(--bg);
        }

        #fixed-bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10; background-size: cover; background-position: center;
            background-color: var(--bg);
        }

        #bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            padding: 0 15px; background: var(--header);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 9999; box-sizing: border-box;
        }

        /* THUMB FRIENDLY BUTTONS */
        .btn-ui { 
            background: #444; color: #fff; border: 1px solid #666; 
            padding: 10px 14px; border-radius: 8px; font-size: 14px; 
        }

        #custom-panel {
            display: none; background: var(--header); padding: 20px;
            border-bottom: 1px solid var(--border); 
            position: fixed; top: 65px; left: 0; width: 100%; z-index: 9998; 
            box-sizing: border-box; flex-direction: column; gap: 15px;
        }

        #chat-container { 
            flex: 1; padding: 15px; display: flex; flex-direction: column; 
            gap: 15px; width: 100%; box-sizing: border-box;
        }

        .bubble {
            max-width: 90%; padding: 12px 16px; border-radius: 20px; 
            font-size: 16px; /* Larger text for mobile reading */
            background-color: var(--ai-bg); color: var(--ai-text); border: var(--bubble-outline);
        }
        .user { align-self: flex-end; background-color: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #drop-zone { 
            border: 2px dashed #66c0f4; padding: 40px 20px; text-align: center; 
            margin: 20px; border-radius: 15px; background: rgba(0,0,0,0.4); 
        }
    </style>
</head>
<body id="main-body">

<div id="fixed-bg-layer"><video id="bg-video" autoplay muted loop playsinline></video></div>

<header>
    <span style="font-weight:bold; font-size: 1.1em;">Fanfic Mobile</span>
    <div class="controls">
        <button id="toggle-custom" class="btn-ui">Settings</button>
        <button id="reset-page" class="btn-ui" style="display:none;">New</button>
    </div>
</header>

<div id="custom-panel">
    <select id="theme-select" class="btn-ui" style="width: 100%;">
        <option value="default">Steam Blue</option>
        <option value="theme-discord">Discord</option>
        <option value="theme-messenger">Messenger</option>
        <option value="custom">Custom Colors</option>
    </select>
    <input type="file" id="bgUpload" accept="image/*,video/mp4" class="btn-ui" style="width: 100%;">
    <button id="clear-bg" class="btn-ui">Clear Background</button>
    <button id="save-theme" class="btn-ui" style="background:#28a745;">Save Settings</button>
</div>

<div id="drop-zone">Tap to upload your fanfic</div>
<div id="chat-container"></div>

<script>
    /* The JavaScript remains largely the same as your PC version 
       (Contrast logic, localstorage, parseContent), but 
       we've simplified the UI interactions for touch! 
    */
    // [Insert the rest of the logic from your PC version here]
</script>
</body>
</html>
