<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanfic Chat Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1b2838; /* Steam Dark Blue */
            color: #dcdedc;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #drop-zone {
            border: 2px dashed #66c0f4;
            padding: 40px;
            text-align: center;
            margin: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
            font-size: 1.2em;
        }
        #drop-zone:hover {
            background-color: rgba(102, 192, 244, 0.1);
            border-color: #ffffff;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
        }
        /* User/Prompt Bubble */
        .user {
            align-self: flex-end;
            background-color: #2a475e;
            color: #66c0f4;
            border-bottom-right-radius: 2px;
        }
        /* AI/Response Bubble */
        .ai {
            align-self: flex-start;
            background-color: #3d3d3d;
            color: #ffffff;
            border-bottom-left-radius: 2px;
            border: 1px solid #4e4e4e;
        }
        .label {
            font-size: 0.75em;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
            opacity: 0.6;
        }
        p { margin: 5px 0; }
        code { background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>

<div id="drop-zone">Click or drop your file here.</div>
<div id="chat-container"></div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const container = document.getElementById('chat-container');

    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = ".md,.txt";
        input.onchange = e => handleFile(e.target.files[0]);
        input.click();
    };

    dropZone.ondragover = (e) => { e.preventDefault(); };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
    };

    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => parseContent(e.target.result);
        reader.readAsText(file);
        dropZone.style.display = 'none';
    }

    function parseContent(text) {
        container.innerHTML = '';
        const segments = text.split(/(?=## Prompt|## Response)/g);

        segments.forEach(segment => {
            if (!segment.trim()) return;
            const isPrompt = segment.includes('## Prompt');
            const typeClass = isPrompt ? 'user' : 'ai';
            const labelText = isPrompt ? 'User' : 'ChatGPT';
            const cleanText = segment.replace(/## Prompt|## Response/g, '').trim();

            const div = document.createElement('div');
            div.className = `bubble ${typeClass}`;
            div.innerHTML = `<span class="label">${labelText}</span>` + marked.parse(cleanText);
            container.appendChild(div);
        });
    }
</script>

</body>
</html>
