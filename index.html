<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Viewer Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root {
            --bg: #1b2838; --header: #171a21; --border: #2a475e; --text: #dcdedc;
            --user-bg: #2a475e; --user-text: #66c0f4; --ai-bg: #3d3d3d; --ai-text: #fff;
            --header-text: #66c0f4;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding-top: 60px; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        #fixed-bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-color: var(--bg); }
        #image-bg { width: 100%; height: 100%; background-size: cover; background-position: center; }
        
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            padding: 0 12px; background: var(--header); display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 9999; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: baseline; gap: 8px; overflow: hidden; flex: 1; }
        #file-name-display { font-size: 0.8em; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #chat-container { padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
        .bubble {
            max-width: 90%; padding: 14px; border-radius: 15px; line-height: 1.5;
            background: var(--ai-bg); color: var(--ai-text); border: 1px solid var(--border);
            word-wrap: break-word;
        }
        .user { align-self: flex-end; background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; border-bottom-left-radius: 2px; }
        .label { font-size: 0.7em; font-weight: bold; margin-bottom: 5px; display: block; opacity: 0.8; }
        
        #drop-zone { 
            border: 2px dashed var(--header-text); padding: 80px 20px; text-align: center; 
            margin: 40px auto; width: 80%; border-radius: 10px; background: rgba(0,0,0,0.3);
        }
        .btn-ui { background: #444; color: #fff; border: 1px solid #666; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div id="fixed-bg-layer"><div id="image-bg"></div></div>

<header>
    <div class="header-left">
        <b style="color:var(--header-text)">Fanfic Viewer</b>
        <span id="file-name-display"></span>
    </div>
    <button id="reset-page" class="btn-ui" style="display:none;">New File</button>
</header>

<div id="drop-zone">Tap here to load <b>Part 7</b></div>
<div id="chat-container"></div>

<script>
    const container = document.getElementById('chat-container');
    const dropZone = document.getElementById('drop-zone');
    const fileNameDisplay = document.getElementById('file-name-display');
    const resetBtn = document.getElementById('reset-page');

    // 1. Improved File Handling
    dropZone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            
            fileNameDisplay.textContent = "— " + file.name;
            const reader = new FileReader();
            reader.onload = event => {
                const content = event.target.result;
                // Try saving, but don't crash if mobile storage is full
                try {
                    localStorage.setItem('last_file_content', content);
                    localStorage.setItem('last_file_name', file.name);
                } catch(e) { console.warn("Storage full, reading without saving."); }
                
                renderStory(content);
            };
            reader.readAsText(file);
        };
        input.click();
    };

    // 2. Specialized Content Parser for ChatGPT Exporter Files
    function renderStory(text) {
        dropZone.style.display = 'none';
        resetBtn.style.display = 'block';
        container.innerHTML = '';

        // Part 7 is divided by "## Prompt:" and "---" or "## Response"
        const segments = text.split(/## Prompt:|## Response:/g);
        
        segments.forEach((segment, index) => {
            if (segment.trim().length < 5) return; // Skip empty segments or headers
            
            const isUser = text.includes("## Prompt:" + segment);
            const div = document.createElement('div');
            div.className = `bubble ${isUser ? 'user' : 'ai'}`;
            
            // Clean up the timestamp and exporter links
            let cleanText = segment.split('---')[0].trim();
            
            div.innerHTML = `<span class="label">${isUser ? 'SAM / PROMPT' : 'STORY / RESPONSE'}</span>` + marked.parse(cleanText);
            container.appendChild(div);
        });
        
        window.scrollTo(0, 0);
    }

    // 3. Auto-Reload on Refresh
    window.onload = () => {
        const lastContent = localStorage.getItem('last_file_content');
        const lastFile = localStorage.getItem('last_file_name');
        if (lastContent) {
            fileNameDisplay.textContent = "— " + lastFile;
            renderStory(lastContent);
        }
    };

    resetBtn.onclick = () => {
        localStorage.clear();
        location.reload();
    };
</script>
</body>
</html>
