<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fanfic Viewer - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root {
            --bg: #1b2838; --header: #171a21; --border: #2a475e; --text: #dcdedc;
            --user-bg: #2a475e; --user-text: #66c0f4; --ai-bg: #3d3d3d; --ai-text: #fff;
            --header-text: #66c0f4; --bubble-outline: 1px solid var(--border);
        }
        body.theme-discord { --bg: #313338; --header: #1e1f22; --border: #232428; --text: #dbdee1; --user-bg: #404249; --user-text: #dbdee1; --ai-bg: #2b2d31; --ai-text: #dbdee1; --header-text: #fff; --bubble-outline: 1px solid var(--border); }
        
        html, body { height: 100%; margin: 0; padding: 0; background-color: #000; overflow: hidden; }

        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; padding-top: 60px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        /* The Layer containing the image */
        #fixed-bg-layer { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -10; background-color: var(--bg); pointer-events: none; 
        }
        
        #image-bg { 
            width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            background-repeat: no-repeat;
            display: none; /* Hidden until image is loaded */
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; padding: 0 12px;
            background: var(--header); display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 9999; color: var(--header-text); box-sizing: border-box;
        }

        .controls { display: flex; gap: 5px; }
        select, .btn-ui { background: #444; color: #fff; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; font-size: 11px; }

        #custom-panel {
            display: none; background: var(--header); padding: 10px; border-bottom: 1px solid var(--border);
            gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;
            position: fixed; top: 60px; left: 0; width: 100%; z-index: 9998; box-sizing: border-box;
        }

        #chat-container { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; width: calc(100% - 40px); }

        .bubble {
            max-width: 85%; padding: 15px; border-radius: 18px; line-height: 1.6;
            background: var(--ai-bg); color: var(--ai-text); border: var(--bubble-outline);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .user { align-self: flex-end; background: var(--user-bg) !important; color: var(--user-text) !important; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #drop-zone { border: 2px dashed #66c0f4; padding: 40px 20px; text-align: center; margin: 20px auto; width: 80%; border-radius: 10px; background: rgba(0,0,0,0.4); cursor: pointer; }
    </style>
</head>
<body>

<div id="fixed-bg-layer">
    <div id="image-bg"></div>
</div>

<header>
    <div><b>Viewer</b></div>
    <div class="controls">
        <button id="toggle-custom" class="btn-ui">⚙️ Settings</button>
        <select id="theme-select">
            <option value="default">Default</option>
            <option value="theme-discord">Discord</option>
            <option value="custom">Custom</option>
        </select>
        <button onclick="location.reload()" class="btn-ui">New</button>
    </div>
</header>

<div id="custom-panel">
    <input type="color" id="headerColor" value="#171a21">
    <input type="color" id="bgColor" value="#1b2838">
    <input type="color" id="userColor" value="#2a475e">
    <input type="color" id="aiColor" value="#3d3d3d">
    <input type="file" id="bgUpload" accept="image/png, image/jpeg">
    <button id="save-theme" class="btn-ui" style="background:#28a745;">Apply & Save</button>
</div>

<div id="drop-zone">Tap to load Fanfic (.txt or .md)</div>
<div id="chat-container"></div>

<script>
    const imageBg = document.getElementById('image-bg');
    const bgUpload = document.getElementById('bgUpload');
    const themeSelect = document.getElementById('theme-select');
    const customPanel = document.getElementById('custom-panel');
    const body = document.body;

    let currentImgBase64 = "";

    // 1. IMPROVED IMAGE LOADING
    bgUpload.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onerror = () => alert("Error reading image file.");
        reader.onload = (event) => {
            currentImgBase64 = event.target.result;
            // Force the image to show immediately
            applySettings();
        };
        reader.readAsDataURL(file);
    };

    function applySettings() {
        // Apply Colors
        body.style.setProperty('--header', document.getElementById('headerColor').value);
        body.style.setProperty('--bg', document.getElementById('bgColor').value);
        body.style.setProperty('--user-bg', document.getElementById('userColor').value);
        body.style.setProperty('--ai-bg', document.getElementById('aiColor').value);
        
        // Apply Image
        if (currentImgBase64) {
            imageBg.style.backgroundImage = "none"; // Clear first
            imageBg.style.backgroundImage = `url("${currentImgBase64}")`;
            imageBg.style.display = "block";
        }
    }

    document.getElementById('save-theme').onclick = () => {
        applySettings();
        const settings = {
            h: document.getElementById('headerColor').value,
            b: document.getElementById('bgColor').value,
            u: document.getElementById('userColor').value,
            a: document.getElementById('aiColor').value,
            img: currentImgBase64.length < 2000000 ? currentImgBase64 : "", // Save if not too huge
            mode: themeSelect.value
        };
        localStorage.setItem('ff_theme_v3', JSON.stringify(settings));
        alert("Theme Applied!");
    };

    themeSelect.onchange = () => {
        if (themeSelect.value === 'custom') {
            customPanel.style.display = 'flex';
            applySettings();
        } else {
            customPanel.style.display = 'none';
            imageBg.style.display = "none";
            body.className = themeSelect.value === 'default' ? '' : themeSelect.value;
            ['--header', '--bg', '--user-bg', '--ai-bg'].forEach(p => body.style.removeProperty(p));
        }
    };

    // Initialization
    window.onload = () => {
        const saved = localStorage.getItem('ff_theme_v3');
        if (saved) {
            const d = JSON.parse(saved);
            document.getElementById('headerColor').value = d.h;
            document.getElementById('bgColor').value = d.b;
            document.getElementById('userColor').value = d.u;
            document.getElementById('aiColor').value = d.a;
            if (d.img) {
                currentImgBase64 = d.img;
            }
            if (d.mode === 'custom') {
                themeSelect.value = 'custom';
                customPanel.style.display = 'flex';
                applySettings();
            }
        }
    };

    // --- Core Functionality (Fanfic Loading) ---
    document.getElementById('toggle-custom').onclick = () => {
        customPanel.style.display = (customPanel.style.display === 'flex') ? 'none' : 'flex';
    };

    document.getElementById('drop-zone').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                renderContent(ev.target.result);
                document.getElementById('drop-zone').style.display = 'none';
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    };

    function renderContent(text) {
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        text.split(/(?=## Prompt|## Response)/g).forEach(s => {
            if (s.trim().length < 10) return;
            const isU = s.includes('## Prompt');
            const div = document.createElement('div');
            div.className = `bubble ${isU ? 'user' : 'ai'}`;
            div.innerHTML = marked.parse(s.replace(/## Prompt:|## Response:/g, '').trim());
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
